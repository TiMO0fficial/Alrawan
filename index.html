<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A complete modern product showcase page with responsive design and WCAG 2.2 accessibility compliance.">
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebPage",
            "name": "Product Showcase"
        }
    </script>
    <title>Product Showcase</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <h1>Product Showcase</h1>
            <button aria-label="Shopping Cart">🛒</button>
        </nav>
    </header>
    <main>
        <section class="products">
            <div class="product-card" aria-labelledby="product1">
                <h2 id="product1">Premium Leather Wallet</h2>
                <p>$49.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product-card" aria-labelledby="product2">
                <h2 id="product2">Smart Watch Pro</h2>
                <p>$199.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product-card" aria-labelledby="product3">
                <h2 id="product3">Wireless Headphones</h2>
                <p>$89.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product-card" aria-labelledby="product4">
                <h2 id="product4">Digital Camera</h2>
                <p>$299.99</p>
                <button>Add to Cart</button>
            </div>
        </section>
    </main>
    <footer>
        <p>Company Info</p>
        <p>Follow us on social media.</p>
    </footer>
</body>
</html>
