<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <title>Product Card</title>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f2e6c3;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .product-card {
            border: 1px solid #d1b84a;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            margin: 10px;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .specifications-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        footer {
            background-color: #d1b84a;
            padding: 20px;
            text-align: center;
        }
        .social-icons {
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .social-icons li {
            display: inline;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Our Products</h1>
        <div class="specifications-grid">
            <div class="product-card">
                <h2>Product 1</h2>
                <p>Specifications: A great product.</p>
                <p>Price: $100</p>
            </div>
            <div class="product-card">
                <h2>Product 2</h2>
                <p>Specifications: An even better product.</p>
                <p>Price: $200</p>
            </div>
            <!-- Add more products as needed -->
        </div>
    </div>
    <footer>
        <p>&copy; 2026 TiMO0fficial. All rights reserved.</p>
        <ul class="social-icons">
            <li><a href="#">Facebook</a></li>
            <li><a href="#">Twitter</a></li>
            <li><a href="#">Instagram</a></li>
        </ul>
    </footer>
</body>
</html>
