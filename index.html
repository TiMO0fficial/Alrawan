<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الروان - المعرض الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
    </style>
</head>
<body>

    <header class="bg-slate-900 text-white p-6 text-center shadow-lg">
        <h1 class="text-2xl font-bold">مكتب الروان</h1>
        <p class="text-sm opacity-80">للهواتف، العطور، والصيانة العامة</p>
    </header>

    <div class="flex justify-center gap-2 p-4 overflow-x-auto">
        <button class="bg-amber-500 text-white px-4 py-2 rounded-full text-sm">الكل</button>
        <button class="bg-white border px-4 py-2 rounded-full text-sm">هواتف</button>
        <button class="bg-white border px-4 py-2 rounded-full text-sm">عطور</button>
        <button class="bg-white border px-4 py-2 rounded-full text-sm">صيانة</button>
    </div>

    <main class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
        
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
            <img src="URL_IMAGE_HERE" alt="Product" class="w-full h-48 object-cover">
            <div class="p-4">
                <span class="text-xs font-bold text-amber-600 bg-amber-100 px-2 py-1 rounded">جديد</span>
                <h2 class="text-lg font-bold mt-2">POCO C71 Gold</h2>
                <p class="text-gray-600 text-sm italic">128GB / 4GB RAM</p>
                <div class="flex justify-between items-center mt-4">
                    <span class="text-xl font-bold text-slate-900">150,000 دينار</span>
                    <a href="https://wa.me/YOUR_NUMBER" class="bg-green-500 text-white p-2 rounded-lg">طلب عبر واتساب</a>
                </div>
            </div>
        </div>

    </main>

    <footer class="text-center p-6 text-gray-500 text-sm">
        الكركوك - الحويجة - الزاب | مكتب الروان
    </footer>

</body>
</html>
